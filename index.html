<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FireGuard Pro | IntegratCore Corp</title>
    <style>
        :root {
            --primary: #3b82f6; --bg-body: #050a14; --bg-card: rgba(15, 23, 42, 0.8);
            --text-dark: #f8fafc; --text-muted: #94a3b8; --border: rgba(51, 65, 85, 0.5);
            --danger: #ff4444; --success: #00ff88; --warning: #ffaa00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-dark); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        .glass { background: var(--bg-card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 16px; }

        /* LOGIN ESTRÍCTO */
        #authScreen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-body); z-index: 5000; }
        .auth-card { width: 90%; max-width: 380px; padding: 30px; text-align: center; border-top: 4px solid var(--primary); }
        .input-pro { width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 16px; }

        /* LAYOUT DINÁMICO */
        #appLayout { display: none; min-height: 100vh; flex-direction: column; }
        
        .sidebar { 
            width: 280px; background: #020617; position: fixed; height: 100vh; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; transform: translateX(-100%); 
        }
        .sidebar.active { transform: translateX(0); }

        .topbar { 
            height: 70px; background: rgba(2, 6, 23, 0.9); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        .main-content { padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }

        /* CARDS Y CLIENTES */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { padding: 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        
        /* BUSCADOR */
        .search-bar { width: 100%; padding: 12px 20px; margin-bottom: 20px; border-radius: 30px; background: var(--bg-card); border: 1px solid var(--border); color: white; }

        /* TABLA / TARJETAS RESPONSIVAS */
        .client-card { 
            margin-bottom: 15px; padding: 20px; display: grid; grid-template-columns: 1fr auto; gap: 10px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .status-atraso { border-left: 5px solid var(--danger); background: rgba(255, 68, 68, 0.05); }
        .status-aldia { border-left: 5px solid var(--success); }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-atraso { background: var(--danger); color: white; box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); }
        .badge-aldia { background: var(--success); color: #000; }

        .btn-mdm { padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; flex: 1; font-size: 12px; }
        .btn-lock { background: rgba(255, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .btn-unlock { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid var(--success); }

        /* OVERLAY MÓVIL */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; }
        .overlay.active { display: block; }

        @media (min-width: 901px) {
            .sidebar { transform: translateX(0); }
            .topbar { margin-left: 280px; }
            .main-content { margin-left: 280px; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card glass">
            <h1 style="color:var(--primary); margin-bottom:10px;">🛡️ FIREGUARD</h1>
            <p style="color:var(--text-muted); font-size:13px; margin-bottom:25px;">SISTEMA DE SEGURIDAD MDM</p>
            <input type="text" id="loginUser" class="input-pro" placeholder="Usuario">
            <input type="password" id="loginPass" class="input-pro" placeholder="Contraseña" autocomplete="new-password">
            <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">INICIAR SESIÓN</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div id="appLayout">
        <aside class="sidebar" id="sidebar">
            <div style="padding:30px; border-bottom:1px solid var(--border);">
                <h2 style="color:var(--primary);">FireGuard</h2>
                <small style="color:var(--text-muted);">INTEGRATCORE CORP</small>
            </div>
            <nav style="padding:20px;">
                <div style="padding:15px; cursor:pointer; color:var(--primary);" onclick="showTab('dashboard')">📊 Panel Principal</div>
                <div style="padding:15px; cursor:pointer;" onclick="showTab('clientes')">👥 Gestión Clientes</div>
                <div style="padding:15px; cursor:pointer;" onclick="showTab('config')">⚙️ Configuración API</div>
                <div style="padding:15px; cursor:pointer; color:var(--danger); margin-top:50px;" onclick="logout()">🚪 Cerrar Sesión</div>
            </nav>
        </aside>

        <header class="topbar">
            <button class="menu-btn" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:24px;">☰</button>
            <div id="reloj" style="font-family:monospace; color:var(--primary);">00:00:00</div>
        </header>

        <main class="main-content">
            
            <div id="tab-dashboard">
                <div class="stat-grid">
                    <div class="glass stat-card">
                        <small style="color:var(--text-muted);">CARTERA TOTAL</small>
                        <h2 id="totalCapital">$0.00</h2>
                    </div>
                    <div class="glass stat-card" style="border-bottom-color:var(--danger);">
                        <small style="color:var(--text-muted);">EN ATRASO</small>
                        <h2 id="totalAtraso" style="color:var(--danger);">$0.00</h2>
                    </div>
                </div>

                <input type="text" class="search-bar" id="search" placeholder="🔍 Buscar por nombre o IMEI..." onkeyup="filterClients()">

                <div id="clientList">
                    </div>
            </div>

            <div id="tab-config" style="display:none;">
                <div class="glass" style="padding:30px;">
                    <h3>Configuración de Seguridad</h3>
                    <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">API Key de Scalefusion</p>
                    <input type="password" id="apiKeyInput" class="input-pro" placeholder="Pega tu API Key aquí">
                    <button onclick="saveApiKey()" style="padding:10px 20px; background:var(--primary); border:none; border-radius:8px; color:white;">Guardar Llave</button>
                </div>
            </div>

            <div id="tab-clientes" style="display:none;">
                <div class="glass" style="padding:25px;">
                    <h3>Nuevo Financiamiento</h3>
                    <input type="text" id="regNombre" class="input-pro" placeholder="Nombre completo">
                    <input type="number" id="regMonto" class="input-pro" placeholder="Monto $">
                    <input type="text" id="regImei" class="input-pro" placeholder="Device ID Scalefusion">
                    <select id="regStatus" class="input-pro">
                        <option value="aldia">Estado: Al Día</option>
                        <option value="atraso">Estado: Atraso</option>
                    </select>
                    <button onclick="addClient()" class="btn-full" style="padding:15px; background:var(--success); color:black;">VINCULAR EQUIPO</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // MOTOR DE DATOS
        let clients = JSON.parse(localStorage.getItem('fg_data')) || [];
        
        // RELOJ
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);

        // NAVEGACIÓN
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function showTab(tab) {
            document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
            document.getElementById('tab-clientes').style.display = tab === 'clientes' ? 'block' : 'none';
            document.getElementById('tab-config').style.display = tab === 'config' ? 'block' : 'none';
            if(window.innerWidth < 900) toggleMenu();
        }

        // SEGURIDAD: LOGIN Y LOGOUT
        function login() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if(u === 'admin' && p === '12345') {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appLayout').style.display = 'flex';
                renderClients();
            } else { alert("Acceso Denegado"); }
        }

        function logout() {
            // Limpieza de seguridad total
            document.getElementById('loginPass').value = "";
            document.getElementById('loginUser').value = "";
            document.getElementById('appLayout').style.display = 'none';
            document.getElementById('authScreen').style.display = 'flex';
        }

        // GESTIÓN DE CLIENTES
        function addClient() {
            const client = {
                id: Date.now(),
                nombre: document.getElementById('regNombre').value,
                monto: parseFloat(document.getElementById('regMonto').value) || 0,
                imei: document.getElementById('regImei').value,
                status: document.getElementById('regStatus').value,
                notas: ""
            };
            if(!client.nombre || !client.imei) return alert("Faltan datos");
            clients.push(client);
            save();
            showTab('dashboard');
        }

        function toggleStatus(id) {
            const c = clients.find(x => x.id === id);
            c.status = c.status === 'aldia' ? 'atraso' : 'aldia';
            save();
        }

        function editNote(id) {
            const c = clients.find(x => x.id === id);
            const n = prompt("Nota de pago:", c.notas);
            if(n !== null) { c.notas = n; save(); }
        }

        function save() {
            localStorage.setItem('fg_data', JSON.stringify(clients));
            renderClients();
        }

        function renderClients(filtered = null) {
            const list = filtered || clients;
            const container = document.getElementById('clientList');
            container.innerHTML = "";
            let total = 0; let atraso = 0;

            list.forEach(c => {
                total += c.monto;
                if(c.status === 'atraso') atraso += c.monto;

                const card = document.createElement('div');
                card.className = `glass client-card ${c.status === 'atraso' ? 'status-atraso' : 'status-aldia'}`;
                card.innerHTML = `
                    <div>
                        <h4 style="display:flex; align-items:center; gap:10px;">
                            ${c.nombre} 
                            <span class="badge ${c.status === 'atraso' ? 'badge-atraso' : 'badge-aldia'}">${c.status}</span>
                        </h4>
                        <p style="font-size:12px; color:var(--text-muted); margin:5px 0;">IMEI: ${c.imei}</p>
                        <p style="color:var(--success); font-weight:bold;">$${c.monto.toLocaleString()}</p>
                        <p style="font-size:11px; color:var(--warning); cursor:pointer;" onclick="editNote(${c.id})">📝 ${c.notas || 'Agregar nota...'}</p>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <button class="btn-mdm btn-lock" onclick="mandarAccion('${c.imei}', 'lock')">BLOQUEAR</button>
                        <button class="btn-mdm btn-unlock" onclick="mandarAccion('${c.imei}', 'unlock')">LIBERAR</button>
                        <button onclick="toggleStatus(${c.id})" style="background:none; border:1px solid #333; color:white; font-size:10px; padding:5px; border-radius:5px;">Cambiar Estado</button>
                        <button onclick="deleteClient(${c.id})" style="background:none; border:none; color:gray; font-size:10px;">Eliminar</button>
                    </div>
                `;
                container.appendChild(card);
            });

            document.getElementById('totalCapital').innerText = "$" + total.toLocaleString();
            document.getElementById('totalAtraso').innerText = "$" + atraso.toLocaleString();
        }

        function deleteClient(id) {
            if(confirm("¿Borrar cliente?")) {
                clients = clients.filter(x => x.id !== id);
                save();
            }
        }

        function filterClients() {
            const text = document.getElementById('search').value.toLowerCase();
            const f = clients.filter(c => c.nombre.toLowerCase().includes(text) || c.imei.includes(text));
            renderClients(f);
        }

        // MOTOR SCALEFUSION (ARREGLO DE RED)
        async function mandarAccion(imei, accion) {
            const key = localStorage.getItem('fg_key') || "9af702bab50a4f4fb8dd1124827b9ce4";
            const url = `https://api.scalefusion.com/api/v1/devices/${imei}/${accion}.json`;
            
            alert(`⏳ Conectando con Scalefusion... Orden: ${accion.toUpperCase()}`);

            try {
                const r = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `Token ${key}`, 'Content-Type': 'application/json' }
                });
                if(r.ok) alert("✅ IMPACTO CONFIRMADO.");
                else alert("❌ Error: Verifica el IMEI o la API Key.");
            } catch(e) {
                alert("📡 Error de red.");
            }
        }

        function saveApiKey() {
            const val = document.getElementById('apiKeyInput').value;
            localStorage.setItem('fg_key', val);
            alert("Llave guardada con éxito");
        }
    </script>
</body>
</html>
